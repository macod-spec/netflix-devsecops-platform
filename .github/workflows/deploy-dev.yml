name: Deploy Dev to AKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: acrnetflixdevmac01.azurecr.io
  API_IMAGE_NAME: netflix-api
  WEB_IMAGE_NAME: netflix-web
  NAMESPACE: netflix-dev

jobs:
  build-and-deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f app/Dockerfile \
            -t $ACR_LOGIN_SERVER/$API_IMAGE_NAME:$IMAGE_TAG \
            -t $ACR_LOGIN_SERVER/$API_IMAGE_NAME:dev \
            --push \
            app

      - name: Build and push Web image
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -f app/Dockerfile.frontend \
            -t $ACR_LOGIN_SERVER/$WEB_IMAGE_NAME:$IMAGE_TAG \
            -t $ACR_LOGIN_SERVER/$WEB_IMAGE_NAME:dev \
            --push \
            app

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          scanners: vuln
          severity: CRITICAL,HIGH
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '1'

      - name: Scan Web image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          scanners: vuln
          severity: CRITICAL,HIGH
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: '1'

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

            - name: Lint Helm chart
        run: |
          helm lint charts/netflix-platform -f charts/netflix-platform/values-dev.yaml

      - name: Deploy with Helm
        run: |
          helm upgrade --install netflix-platform charts/netflix-platform \
            -f charts/netflix-platform/values-dev.yaml \
            --namespace $NAMESPACE \
            --create-namespace \
            --set image.tag=$IMAGE_TAG

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/netflix-api -n $NAMESPACE --timeout=180s
          kubectl rollout status deployment/netflix-web -n $NAMESPACE --timeout=180s

        - name: Show service status
        run: |
          helm list -n $NAMESPACE
          helm status netflix-platform -n $NAMESPACE
          kubectl get pods -n $NAMESPACE
          kubectl get svc -n $NAMESPACE
          kubectl get deployment netflix-api -n $NAMESPACE -o=jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'
          kubectl get deployment netflix-web -n $NAMESPACE -o=jsonpath='{.spec.template.spec.containers[0].image}{"\n"}'