apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netflix-platform-dev
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/macod-spec/netflix-devsecops-platform.git
    targetRevision: main
    path: charts/netflix-platform
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: netflix-dev

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true