namespace: netflix-dev

image:
  registry: acrnetflixdevmac01.azurecr.io
  tag: "989b01e"
  pullPolicy: Always

api:
  name: netflix-api
  replicas: 1
  imageName: netflix-api
  containerPort: 8080

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"


  env:
    tmdbBaseUrl: "https://api.themoviedb.org/3"

  secret:
    name: netflix-tmdb
    apiKeyName: TMDB_API_KEY

  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080

  probes:
    readinessPath: /ready
    livenessPath: /health
    readinessInitialDelaySeconds: 15
    livenessInitialDelaySeconds: 30

web:
  name: netflix-web
  replicas: 1
  imageName: netflix-web
  containerPort: 8080

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
      
  service:
    type: LoadBalancer
    port: 80
    targetPort: 8080

  probes:
    path: /health
    readinessInitialDelaySeconds: 10
    livenessInitialDelaySeconds: 20