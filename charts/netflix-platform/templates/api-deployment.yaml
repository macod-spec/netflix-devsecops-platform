apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.api.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.api.name }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.api.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.api.name }}
        {{- if .Values.api.keyVault.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      {{- if .Values.api.serviceAccount.create }}
      serviceAccountName: {{ .Values.api.serviceAccount.name }}
      {{- end }}
      containers:
        - name: {{ .Values.api.name }}
          image: "{{ .Values.image.registry }}/{{ .Values.api.imageName }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.containerPort }}
          env:
            - name: TMDB_BASE_URL
              value: {{ .Values.api.env.tmdbBaseUrl | quote }}
            {{- if .Values.api.keyVault.enabled }}
            - name: TMDB_API_KEY_FILE
              value: {{ .Values.api.keyVault.tmdbApiKeyFile | quote }}
            {{- else }}
            - name: TMDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.secret.name }}
                  key: {{ .Values.api.secret.apiKeyName }}
            {{- end }}
          {{- if .Values.api.keyVault.enabled }}
          volumeMounts:
            - name: keyvault-secrets
              mountPath: {{ .Values.api.keyVault.mountPath | quote }}
              readOnly: true
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.probes.readinessPath }}
              port: {{ .Values.api.containerPort }}
            initialDelaySeconds: {{ .Values.api.probes.readinessInitialDelaySeconds }}
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ .Values.api.probes.livenessPath }}
              port: {{ .Values.api.containerPort }}
            initialDelaySeconds: {{ .Values.api.probes.livenessInitialDelaySeconds }}
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
      {{- if .Values.api.keyVault.enabled }}
      volumes:
        - name: keyvault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ .Values.api.keyVault.secretProviderClassName }}
      {{- end }}