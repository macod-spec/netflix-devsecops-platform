apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.api.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.api.name }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.api.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.api.name }}
    spec:
      containers:
        - name: {{ .Values.api.name }}
          image: "{{ .Values.image.registry }}/{{ .Values.api.imageName }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.containerPort }}

          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}

          readinessProbe:
            httpGet:
              path: {{ .Values.api.probes.path }}
              port: {{ .Values.api.containerPort }}
            initialDelaySeconds: {{ .Values.api.probes.readinessInitialDelaySeconds }}
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: {{ .Values.api.probes.path }}
              port: {{ .Values.api.containerPort }}
            initialDelaySeconds: {{ .Values.api.probes.livenessInitialDelaySeconds }}
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3