{{- if .Values.api.keyVault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.api.keyVault.secretProviderClassName }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.api.name }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.api.keyVault.clientId | quote }}
    keyvaultName: {{ .Values.api.keyVault.name | quote }}
    tenantId: {{ .Values.api.keyVault.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: {{ .Values.api.keyVault.tmdbSecretName }}
          objectType: secret
          objectVersion: ""
{{- end }}